# PartnerScope host nginx config — /etc/nginx/sites-available/partnerscope.conf
# symlink to /etc/nginx/sites-enabled/partnerscope.conf
#
# Installed by ops/cloud-init.yaml on first boot; updated by ops/deploy.sh on config change.
# Terminates TLS via Let's Encrypt (certbot), serves static site, reverse-proxies the API.

# ─── Rate limits ─────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=intake_zone:10m rate=2r/s;
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=20r/s;

# ─── HTTPS redirect for apex + www + api ─────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name partnerscope.eu www.partnerscope.eu api.partnerscope.eu;

    # ACME challenge — served over HTTP, rest redirected to HTTPS.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── www → apex canonical redirect ───────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.partnerscope.eu;

    ssl_certificate /etc/letsencrypt/live/partnerscope.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/partnerscope.eu/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://partnerscope.eu$request_uri;
}

# ─── partnerscope.eu — marketing site (Astro static) ─────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name partnerscope.eu;

    ssl_certificate /etc/letsencrypt/live/partnerscope.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/partnerscope.eu/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/partnerscope/web;
    index index.html;

    # Security headers.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;

    # Astro builds with trailingSlash: 'never' and format: 'file', so requests
    # arrive as /plans and map to /plans.html.
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Long-cache hashed static assets.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    location = /sitemap-index.xml {
        log_not_found off;
    }

    # Custom 404.
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}

# ─── api.partnerscope.eu — Fastify API reverse proxy ─────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.partnerscope.eu;

    ssl_certificate /etc/letsencrypt/live/api.partnerscope.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.partnerscope.eu/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Global security headers — API responses don't override Astro's.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Stripe webhooks need the raw body for signature verification.
    # Use a bigger client_max_body_size to accept document uploads for Pro assessments.
    client_max_body_size 25m;
    proxy_request_buffering off;

    # Intake endpoint is public and unauthenticated — hold it behind a tight rate limit.
    location = /v1/intake {
        limit_req zone=intake_zone burst=5 nodelay;
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    location / {
        limit_req zone=api_zone burst=40 nodelay;
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    access_log /var/log/nginx/api.access.log;
    error_log  /var/log/nginx/api.error.log warn;
}
