#cloud-config
# Hetzner Cloud-init for a fresh Ubuntu 24.04 LTS server.
#
# Usage:
#   1. Create a Hetzner Cloud server (CX22 or larger, Ubuntu 24.04).
#   2. In the "User data" field, paste the contents of this file.
#   3. BEFORE pasting, replace the two placeholders:
#        - {{SSH_PUBLIC_KEY}}        — contents of ~/.ssh/id_ed25519.pub from your laptop
#        - {{DEPLOY_SSH_PUBLIC_KEY}} — GitHub Actions deploy key public half (see ops/DEPLOY.md)
#   4. Create the server; cloud-init runs on first boot (3–5 min).
#   5. SSH in as `deploy`, continue with ops/DEPLOY.md "First deploy" section.

package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - ufw
  - fail2ban
  - unattended-upgrades
  - nginx
  - certbot
  - python3-certbot-nginx
  - git
  - rsync
  - htop
  - vim

users:
  - name: deploy
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: 'ALL=(ALL) NOPASSWD:ALL'
    ssh_authorized_keys:
      - {{SSH_PUBLIC_KEY}}
      - {{DEPLOY_SSH_PUBLIC_KEY}}

write_files:
  - path: /etc/ssh/sshd_config.d/99-hardening.conf
    content: |
      PermitRootLogin no
      PasswordAuthentication no
      PubkeyAuthentication yes
      X11Forwarding no
      MaxAuthTries 3
      ClientAliveInterval 300
      ClientAliveCountMax 2
      AllowUsers deploy
    permissions: '0644'

  - path: /etc/fail2ban/jail.d/sshd.conf
    content: |
      [sshd]
      enabled = true
      maxretry = 3
      findtime = 600
      bantime = 3600
    permissions: '0644'

runcmd:
  # ─── Docker install (official apt repo) ────────────────────────────────
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
    https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
    > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable --now docker

  # ─── Firewall ──────────────────────────────────────────────────────────
  - ufw --force reset
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable

  # ─── SSH + fail2ban ────────────────────────────────────────────────────
  - systemctl restart ssh
  - systemctl enable --now fail2ban

  # ─── Unattended security updates ───────────────────────────────────────
  - dpkg-reconfigure -f noninteractive unattended-upgrades

  # ─── App directories ───────────────────────────────────────────────────
  - mkdir -p /opt/partnerscope /var/www/partnerscope/web /var/www/certbot /var/log/nginx
  - chown -R deploy:deploy /opt/partnerscope /var/www/partnerscope
  - chmod 750 /opt/partnerscope

  # ─── nginx — disable default site; actual config goes in via deploy.sh ─
  - rm -f /etc/nginx/sites-enabled/default
  - systemctl enable nginx

  # ─── Marker file so deploy.sh knows cloud-init finished ────────────────
  - touch /var/lib/partnerscope-cloud-init-done
